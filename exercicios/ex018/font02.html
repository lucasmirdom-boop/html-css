<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'love' ;
            src: url(fontes/love\ larry\ ttf.ttf);
        }
            /*
            tipos de format()
            - opentype()
            - truetype ()
            - embedded-opentype
            - truetype-aat (Apple Advanced Typography)
            - svg

            */
        
        body{
            font-family: sans-serif;
        }
        h1{
            font-family: 'love';
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>

</html>
